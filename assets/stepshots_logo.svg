<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Top card (tilted right) -->
  <rect x="18" y="4" width="38" height="22" rx="4" fill="#537188" stroke="#CBB279" stroke-width="2" transform="rotate(2, 37, 15)"/>
  <rect x="23" y="10" width="16" height="2" rx="1" fill="#CBB279" opacity="0.7"/>
  <rect x="23" y="15" width="10" height="2" rx="1" fill="#E1D4BB" opacity="0.5"/>

  <!-- Middle card (centered, heavy overlap) -->
  <rect x="12" y="14" width="38" height="22" rx="4" fill="#537188" stroke="#CBB279" stroke-width="2"/>
  <rect x="17" y="20" width="16" height="2" rx="1" fill="#CBB279" opacity="0.7"/>
  <rect x="17" y="25" width="10" height="2" rx="1" fill="#E1D4BB" opacity="0.5"/>

  <!-- Bottom card (tilted left, heavy overlap) -->
  <rect x="6" y="24" width="38" height="22" rx="4" fill="#537188" stroke="#CBB279" stroke-width="2" transform="rotate(-2, 25, 35)"/>
  <rect x="11" y="30" width="16" height="2" rx="1" fill="#CBB279" opacity="0.7"/>
  <rect x="11" y="35" width="10" height="2" rx="1" fill="#E1D4BB" opacity="0.5"/>
</svg>
